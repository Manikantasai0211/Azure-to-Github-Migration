name: Deploy

on:
  workflow_call:
    inputs:
      runs-on:
        description: Platform to execute on
        type: string
        default: ubuntu-latest
        required: false

      ref:
        description: Git reference (branch name) to detect changes
        type: string
        default: ${{ github.ref }}
        required: false

      source-folder:
        description: The folder path containing Salesforce source
        type: string
        default: force-app
        required: true

      artifact-name:
        description: Name of the build artifact to publish
        type: string
        required: true

      applicationId:
        description: Business Application ID (for logging/traceability)
        required: true
        type: string

      test_level:
        description: "Choose test level"
        type: string
        default: RunLocalTests
        required: false

      test_classes:
        description: "Comma-separated test classes (only for RunSpecifiedTests)"
        type: string
        default: ""
        required: false

    secrets:
      DEV_ORG_CLIENTID:
        required: true
        description: Salesforce Connected App Client ID
      DEV_ORG_USERNAME:
        required: true
        description: Salesforce Org Username
      DEV_ORG_URL:
        required: true
        description: Salesforce Org URL
      SERVER_KEY:
        required: true
        description: JWT Server Key for Salesforce Auth

jobs:
  build_publish:
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16.x'

      - name: Install Salesforce CLI and Plugins
        run: |
          npm install sfdx-cli --global
          sfdx --version
          echo 'y' | sfdx plugins:install sfpowerkit

      - name: Generate Delta Package
        run: |
          LATEST_COMMIT_ID=$(git log -n 1 --pretty=format:'%H')
          PREV_COMMIT_ID=$(git log --format="%P" -n 1 | cut -d ' ' -f1)

          echo "Latest Commit = $LATEST_COMMIT_ID"
          echo "Previous Commit = $PREV_COMMIT_ID"

          sfdx sfpowerkit:project:diff -r $PREV_COMMIT_ID -t $LATEST_COMMIT_ID -d Delta_pkg

          if [ ! -d "Delta_pkg" ]; then
            echo "❌ No diff found, exiting."
            exit 1
          fi

      - name: Authenticate Salesforce Org
        run: |
          echo "${{ secrets.SERVER_KEY }}" > server.key
          sfdx force:auth:jwt:grant \
            --clientid ${{ secrets.DEV_ORG_CLIENTID }} \
            --jwtkeyfile ./server.key \
            --username ${{ secrets.DEV_ORG_USERNAME }} \
            --instanceurl ${{ secrets.DEV_ORG_URL }}

      - name: Check Code Coverage
        run: |
          echo "🔍 Running all tests with coverage..."
          sfdx force:apex:test:run -u ${{ secrets.DEV_ORG_USERNAME }} --codecoverage --resultformat json --outputdir test-results --wait 30

          echo "🔍 Validating per-class coverage..."
          LOW_COVERAGE=$(jq '.coverage.coverageByClass[] | select(.percent < 75)' test-results/test-result.json)

          if [[ -n "$LOW_COVERAGE" ]]; then
            echo "❌ Some classes/triggers have <75% coverage:"
            echo "$LOW_COVERAGE"
            exit 1
          else
            echo "✅ All classes/triggers have >=75% coverage."
          fi

      - name: Deploy to Salesforce Org
        run: |
          TEST_LEVEL="${{ inputs.test_level }}"
          TEST_CLASSES="${{ inputs.test_classes }}"

          if [[ "$TEST_LEVEL" == "RunSpecifiedTests" ]]; then
            if [[ -z "$TEST_CLASSES" ]]; then
              echo "❌ Please specify test classes when using RunSpecifiedTests"
              exit 1
            fi
            sfdx force:source:deploy -c -p Delta_pkg/force-app -u ${{ secrets.DEV_ORG_USERNAME }} -l RunSpecifiedTests -r $TEST_CLASSES
          else
            sfdx force:source:deploy -c -p Delta_pkg/force-app -u ${{ secrets.DEV_ORG_USERNAME }} -l $TEST_LEVEL
          fi

          echo "🎉 Deployment validation completed successfully"
