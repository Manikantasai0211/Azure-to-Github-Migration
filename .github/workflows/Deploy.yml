name: Deploy

on:
  workflow_dispatch:
    inputs:
      manual_commit_id:
        description: 'Manual commit ID (Base for Delta)'
        required: false
        default: 'default'
      test_level:  
        description: 'Select Test Level'
        required: true
        type: choice
        options:
          - NoTestRun
          - RunSpecifiedTests
          - RunLocalTests
          - RunAllTestsInOrg
        default: NoTestRun
      test_classes:
        description: 'Test classes (Comma separated for RunSpecifiedTests)'
        required: false
        default: ''

env:
  DEV_ORG_USERNAME: ${{ vars.DEV_USERNAME }}
  DEV_ORG_PASSWORD: ${{ secrets.DEV_PASSWORD }}
  DEV_ORG_URL: ${{ vars.DEV_URL }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: 'DevOrg'
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16.x'

      - name: Install SFDX CLI and plugins
        run: |
          npm install sfdx-cli --global
          echo 'y' | sfdx plugins:install sfpowerkit
          
      - name: Determine commit IDs and generate delta
        id: commit_delta
        run: |


          LATEST_COMMIT_ID=$(git log -n 1 origin/DevOrg --pretty=format:'%H')


          MANUAL_COMMIT_ID="${{ github.event.inputs.manual_commit_id }}"

          if [[ "$MANUAL_COMMIT_ID" == 'default' ]]; then
            MANUAL_COMMIT_ID=$(git log --format="%P" -n 1)
            MANUAL_COMMIT_ID=$(echo $MANUAL_COMMIT_ID | cut -d ' ' -f1)
          fi

          echo "Latest COMMIT ID = $LATEST_COMMIT_ID"
          echo "Previous COMMIT ID = $MANUAL_COMMIT_ID"

          sfdx sfpowerkit:project:diff -r $MANUAL_COMMIT_ID -t $LATEST_COMMIT_ID -d Delta_pkg

          if [ ! -d "Delta_pkg" ]; then
            echo "No diff found, exiting."
            exit 1
          fi


      - name: Preview Delta Files
        run: |
          echo "--- The following Metadata will be validated ---"
          ls -R Delta_pkg

      - name: Authenticate Org
        run: |
          echo "Authenticating to Salesforce..."
          sfdx sfpowerkit:auth:login -u $DEV_ORG_USERNAME -p $DEV_ORG_PASSWORD -r $DEV_ORG_URL

      - name: Validation and deploy
        run: |
          TEST_LEVEL="${{ github.event.inputs.test_level }}"
          TEST_CLASSES="${{ github.event.inputs.test_classes }}"

          echo "▶ Starting Metadata Validation with test level: $TEST_LEVEL"
          
          # Base command: 
          # -c (Check only)
          # -d (Directory)
          # -w (Wait for 10 mins to see results)
          # --verbose (List the delta files in logs)
          BASE_CMD="sfdx force:mdapi:deploy -c -d Delta_pkg -u $DEV_ORG_USERNAME -w 10 --verbose"

          case "$TEST_LEVEL" in
            NoTestRun)
              $BASE_CMD --testlevel NoTestRun
              ;;
            RunSpecifiedTests)
              TEST_CLASSES=$(echo $TEST_CLASSES | tr -d ' ')
              if [[ -z "$TEST_CLASSES" ]]; then
                echo "❌ Error: RunSpecifiedTests selected but no test classes provided."
                exit 1
              fi
              $BASE_CMD --testlevel RunSpecifiedTests --runtests "$TEST_CLASSES"
              ;;
            RunLocalTests)
              $BASE_CMD --testlevel RunLocalTests
              ;;
            RunAllTestsInOrg)
              $BASE_CMD --testlevel RunAllTestsInOrg
              ;;
            *)
              echo "❌ Invalid test level: $TEST_LEVEL"
              exit 1
              ;;
          esac

          echo "🎉 Validation completed successfully"
