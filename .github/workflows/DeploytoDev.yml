name: Deploy-To-Dev

on:
  workflow_dispatch:
    inputs:
      manual_commit_id:
        description: 'Manual commit ID'
        required: false
        default: 'default'
      test_level:
        description: 'Enter type of test case to be checked'
        required: true
        type: choice
        options:
          - NoTestRun
          - RunSpecifiedTests
          - RunLocalTests
          - RunAllTestsInOrg
        default: RunSpecifiedTests
      test_classes:
        description: 'Test classes'
        required: false
        default: ''
      validation_only:
        description: 'Run validation only (checkonly)'
        required: false
        default: ''

env:
  DEV_ORG_USERNAME: ${{ vars.DEV_USERNAME }}
  DEV_ORG_PASSWORD: ${{ secrets.DEV_PASSWORD }}
  DEV_ORG_URL: ${{ vars.DEV_URL }}
  DEV_ORG_CLIENTID: ${{ secrets.DEV_ORG_CLIENTID }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: 'DevOrg'
          fetch-depth: 0

      - name: Debug repo structure
        run: |
          pwd
          ls -la
          find . -name "sfdx-project.json"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16.x'

      - name: Install SFDX CLI and plugins
        run: |
          npm install sfdx-cli --global
          sfdx --version
          echo 'y' | sfdx plugins:install sfpowerkit
          
      - name: Determine commit IDs and generate delta
        id: commit_delta
        run: |
          cd force-app

          LATEST_COMMIT_ID=$(git log -n 1 origin/DevOrg --pretty=format:'%H')
          MANUAL_COMMIT_ID="${{ github.event.inputs.manual_commit_id }}"

          if [[ "$MANUAL_COMMIT_ID" == 'default' ]]; then
            MANUAL_COMMIT_ID=$(git log --format="%P" -n 1)
            MANUAL_COMMIT_ID=$(echo $MANUAL_COMMIT_ID | cut -d ' ' -f1)
          fi

          echo "Latest COMMIT ID = $LATEST_COMMIT_ID"
          echo "Previous COMMIT ID = $MANUAL_COMMIT_ID"

          sfdx sfpowerkit:project:diff \
            --revisionfrom $MANUAL_COMMIT_ID \
            --revisionto $LATEST_COMMIT_ID \
            --output Delta_pkg

          if [ ! -d "Delta_pkg" ]; then
            echo "❌ No diff found, exiting."
            exit 1
          fi

      - name: Authenticate Org
        run: |
          echo "Authenticating DEV Org"
          sfdx force:auth:jwt:grant --clientid $DEV_ORG_CLIENTID --jwtkeyfile ./server.key --username $DEV_ORG_USERNAME --instanceurl $DEV_ORG_URL 

      - name: Authenticate and deploy
        id: deploy_step
        run: |
          TEST_LEVEL="${{ github.event.inputs.test_level }}"
          TEST_CLASSES="${{ github.event.inputs.test_classes }}"
          VALIDATION_ONLY="${{ github.event.inputs.validation_only }}"

          echo "Selected TEST_LEVEL = $TEST_LEVEL"
          echo "Selected TEST_CLASSES = $TEST_CLASSES"
          echo "Selected VALIDATION_ONLY = $VALIDATION_ONLY"

          if [[ "$TEST_LEVEL" == "RunSpecifiedTests" ]]; then
            TEST_CLASSES=$(echo "$TEST_CLASSES" | tr '\n' ',' | tr -d ' ' | tr -s ',' | sed 's/^,//;s/,$//')
            if [[ -z "$TEST_CLASSES" ]]; then
              echo "❌ Please specify Test Class names for RunSpecifiedTests."
              exit 1
            fi
            echo "▶ Deploying with specified tests: $TEST_CLASSES"
            DEPLOY_OUTPUT=$(sfdx force:source:deploy \
              -p force-app/main/default \
              -u "$DEV_ORG_USERNAME" \
              -l RunSpecifiedTests \
              -r "$TEST_CLASSES" \
              ${VALIDATION_ONLY:+-c} \
              --json)
          else
            DEPLOY_OUTPUT=$(sfdx force:source:deploy \
              -p force-app/main/default \
              -u "$DEV_ORG_USERNAME" \
              -l "$TEST_LEVEL" \
              ${VALIDATION_ONLY:+-c} \
              --json)
          fi

          echo "$DEPLOY_OUTPUT" > deploy-result.json
          DEPLOY_ID=$(jq -r '.result.id' deploy-result.json)
          echo "Deploy ID: $DEPLOY_ID"
          echo "DEPLOY_ID=$DEPLOY_ID" >> $GITHUB_ENV

      - name: Show Deploy Report
        if: always()   # run even if deploy failed
        run: |
          echo "Fetching deploy report for $DEPLOY_ID..."
          sfdx force:source:deploy:report -i $DEPLOY_ID -u $DEV_ORG_USERNAME
          
          echo "Validation"
          sfdx force:source:deploy -c -p force-app/main/default -u $DEV_ORG_USERNAME -l "$TEST_LEVEL"
          echo "🎉 Validation completed successfully"
