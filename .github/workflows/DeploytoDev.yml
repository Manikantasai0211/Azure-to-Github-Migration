name: Deploy-To-Dev

on:
  workflow_dispatch:
    inputs:
      manual_commit_id:
        description: 'Manual commit ID'
        required: false
        default: 'default'
      test_level:
        description: 'Enter type of test case to be checked'
        required: true
        type: choice
        options:
          - NoTestRun
          - RunSpecifiedTests
          - RunLocalTests
          - RunAllTestsInOrg
        default: RunSpecifiedTests
      test_classes:
        description: 'Test classes'
        required: false
        default: ''

env:
  DEV_ORG_USERNAME: ${{ vars.DEV_USERNAME }}
  DEV_ORG_PASSWORD: ${{ secrets.DEV_PASSWORD }}
  DEV_ORG_URL: ${{ vars.DEV_URL }}
  DEV_ORG_CLIENTID: ${{ secrets.DEV_ORG_CLIENTID }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: 'DevOrg'
          fetch-depth: 0

      - name: Debug repo structure
        run: |
          pwd
          ls -la
          find . -name "sfdx-project.json"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16.x'


      - name: Install SFDX CLI and plugins
        run: |
          npm install sfdx-cli --global
          sfdx --version
          echo 'y' | sfdx plugins:install sfpowerkit
          
      - name: Determine commit IDs and generate delta
        id: commit_delta
        run: |
          cd force-app

          LATEST_COMMIT_ID=$(git log -n 1 origin/DevOrg --pretty=format:'%H')
          MANUAL_COMMIT_ID="${{ github.event.inputs.manual_commit_id }}"

          if [[ "$MANUAL_COMMIT_ID" == 'default' ]]; then
            MANUAL_COMMIT_ID=$(git log --format="%P" -n 1)
            MANUAL_COMMIT_ID=$(echo $MANUAL_COMMIT_ID | cut -d ' ' -f1)
          fi

          echo "Latest COMMIT ID = $LATEST_COMMIT_ID"
          echo "Previous COMMIT ID = $MANUAL_COMMIT_ID"

          sfdx sfpowerkit:project:diff \
          --revisionfrom $MANUAL_COMMIT_ID \
          --revisionto $LATEST_COMMIT_ID \
          --output Delta_pkg

          if [ ! -d "Delta_pkg" ]; then
            echo "❌ No diff found, exiting."
            exit 1
          fi

      - name: Authenticate Org
        run: |
          echo "Authenticating DEV Org"
          sfdx force:auth:jwt:grant --clientid $DEV_ORG_CLIENTID --jwtkeyfile ./server.key --username $DEV_ORG_USERNAME --instanceurl $DEV_ORG_URL 

      - name: Check Code Coverage for Delta
        run: |
          echo "🔍 Collecting changed Apex classes..."
          CHANGED_CLASSES=$(find force-app/main/default/classes -name "*.cls" -exec basename {} .cls \;)

          if [[ -z "$CHANGED_CLASSES" ]]; then
            echo "ℹ️ No Apex classes changed in this PR, skipping coverage check."
            exit 0
          fi

          echo "🔍 Running tests for changed classes: $CHANGED_CLASSES"
          sfdx force:apex:test:run \
            --tests $CHANGED_TEST_CLASSES \
            --codecoverage \
            --resultformat json \
            --outputdir test-results \
            --targetusername $DEV_ORG_USERNAME \
            --wait 30
          
          echo "🔍 Validating coverage for changed classes..."
          for CLASS in $CHANGED_CLASSES; do
            COVERAGE=$(jq ".coverage.coverageByClass[] | select(.name==\"$CLASS\") | .percent" test-results/test-result.json)
            if [[ "$COVERAGE" -lt 75 ]]; then
              echo "❌ $CLASS has coverage $COVERAGE%, below 75%"
              exit 1
            else
              echo "✅ $CLASS has coverage $COVERAGE%"
            fi
          done

      - name: Deploy to Org
        run: |
          TEST_LEVEL="${{ github.event.inputs.test_level }}"
          TEST_CLASSES="${{ github.event.inputs.test_classes }}"

          if [[ "$TEST_LEVEL" == 'RunSpecifiedTests' ]]; then
            TEST_CLASSES=$(echo $TEST_CLASSES | tr -d ' ')
            if [[ -z "$TEST_CLASSES" ]]; then
              echo "❌ Please specify the Test Classes Names to run."
              exit 1
            else
              sfdx force:source:deploy -c -p Delta_pkg/force-app -u $DEV_ORG_USERNAME -l RunSpecifiedTests -r $TEST_CLASSES
            fi
          else
            sfdx force:source:deploy -c -p Delta_pkg/force-app -u $DEV_ORG_USERNAME -l $TEST_LEVEL
          fi

          echo "🎉 Validation completed successfully"
