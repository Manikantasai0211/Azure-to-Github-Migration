name: Deploy-To-Dev

on:
  workflow_dispatch:
    inputs:
      manual_commit_id:
        description: 'Manual commit ID'
        required: false
        default: 'default'
      test_level:
        description: 'Enter type of test case to be checked'
        required: true
        type: choice
        options:
          - NoTestRun
          - RunSpecifiedTests
          - RunLocalTests
          - RunAllTestsInOrg
        default: RunSpecifiedTests
      test_classes:
        description: 'Test classes'
        required: false
        default: ''
      validation_only:
        description: 'Run validation only (checkonly)'
        required: false
        default: ''

env:
  DEV_ORG_USERNAME: ${{ vars.DEV_USERNAME }}
  DEV_ORG_PASSWORD: ${{ secrets.DEV_PASSWORD }}
  DEV_ORG_URL: ${{ vars.DEV_URL }}
  DEV_ORG_CLIENTID: ${{ secrets.DEV_ORG_CLIENTID }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: 'DevOrg'
          fetch-depth: 0

      - name: Debug repo structure
        run: |
          pwd
          ls -la
          find . -name "sfdx-project.json"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16.x'

      - name: Install SFDX CLI and plugins
        run: |
          npm install sfdx-cli --global
          sfdx --version
          echo 'y' | sfdx plugins:install sfpowerkit
          
      - name: Determine commit IDs and generate delta
        id: commit_delta
        run: |
          cd force-app

          LATEST_COMMIT_ID=$(git log -n 1 origin/DevOrg --pretty=format:'%H')


          MANUAL_COMMIT_ID="${{ github.event.inputs.manual_commit_id }}"

          if [[ "$MANUAL_COMMIT_ID" == 'default' ]]; then
            MANUAL_COMMIT_ID=$(git log --format="%P" -n 1)
            MANUAL_COMMIT_ID=$(echo $MANUAL_COMMIT_ID | cut -d ' ' -f1)
          fi

          echo "Latest COMMIT ID = $LATEST_COMMIT_ID"
          echo "Previous COMMIT ID = $MANUAL_COMMIT_ID"

          sfdx sfpowerkit:project:diff -r $MANUAL_COMMIT_ID -t $LATEST_COMMIT_ID -d Delta_pkg

          if [ ! -d "Delta_pkg" ]; then
            echo "No diff found, exiting."
            exit 1
          fi

      - name: Authenticate Org
        run: |
          echo "Authenticating DEV Org"
          sfdx force:auth:jwt:grant --clientid $DEV_ORG_CLIENTID --jwtkeyfile ./server.key --username $DEV_ORG_USERNAME --instanceurl $DEV_ORG_URL 


      - name: Authenticate and deploy
        run: |
          TEST_LEVEL="${{ github.event.inputs.test_level }}"
          TEST_CLASSES="${{ github.event.inputs.test_classes }}"

          echo "▶ Starting validation with test level: $TEST_LEVEL"

          case "$TEST_LEVEL" in
            NoTestRun)
              sfdx force:source:deploy -c -p Delta_pkg/force-app -u $DEV_ORG_USERNAME --testlevel NoTestRun
              ;;
            RunSpecifiedTests)
              TEST_CLASSES=$(echo $TEST_CLASSES | tr -d ' ')
              if [[ -z "$TEST_CLASSES" ]]; then
                echo "❌ Please specify the Test Classes Names to run."
                exit 1
              fi
              sfdx force:source:deploy -c -p Delta_pkg/force-app -u $DEV_ORG_USERNAME --testlevel RunSpecifiedTests --runtests "$TEST_CLASSES"
              ;;
            RunLocalTests)
              sfdx force:source:deploy -c -p Delta_pkg/force-app -u $DEV_ORG_USERNAME --testlevel RunLocalTests
              ;;
            RunAllTestsInOrg)
              sfdx force:source:deploy -c -p Delta_pkg/force-app -u $DEV_ORG_USERNAME --testlevel RunAllTestsInOrg
              ;;
            *)
              echo "❌ Invalid test level: $TEST_LEVEL"
              exit 1
              ;;
          esac

          echo "🎉 Validation completed successfully"

