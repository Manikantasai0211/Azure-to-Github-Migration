name: Deploy-To-Dev

on:
  workflow_dispatch:
    inputs:
      manual_commit_id:
        description: 'Manual commit ID'
        required: false
        default: 'default'
      test_level:
        description: 'Enter type of test case to be checked'
        required: true
        type: choice
        options:
          - NoTestRun
          - RunSpecifiedTests
          - RunLocalTests
          - RunAllTestsInOrg
        default: RunSpecifiedTests
      test_classes:
        description: 'Test classes'
        required: false
        default: ''
      validation_only:
        description: 'Run validation only (checkonly)'
        required: false
        default: ''

env:
  DEV_ORG_USERNAME: ${{ vars.DEV_USERNAME }}
  DEV_ORG_PASSWORD: ${{ secrets.DEV_PASSWORD }}
  DEV_ORG_URL: ${{ vars.DEV_URL }}
  DEV_ORG_CLIENTID: ${{ secrets.DEV_ORG_CLIENTID }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: 'DevOrg'
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16.x'

      - name: Install SFDX CLI and plugins
        run: |
          npm install sfdx-cli --global
          sfdx --version
          echo 'y' | sfdx plugins:install sfpowerkit
          
      - name: Determine commit IDs and generate delta
        id: commit_delta
        run: |
          cd force-app
          LATEST_COMMIT_ID=$(git log -n 1 origin/DevOrg --pretty=format:'%H')
          MANUAL_COMMIT_ID="${{ github.event.inputs.manual_commit_id }}"

          if [[ "$MANUAL_COMMIT_ID" == 'default' ]]; then
            MANUAL_COMMIT_ID=$(git log --format="%P" -n 1 | cut -d ' ' -f1)
          fi

          echo "Latest COMMIT ID = $LATEST_COMMIT_ID"
          echo "Previous COMMIT ID = $MANUAL_COMMIT_ID"

          sfdx sfpowerkit:project:diff \
            --revisionfrom $MANUAL_COMMIT_ID \
            --revisionto $LATEST_COMMIT_ID \
            --output Delta_pkg

          if [ ! -d "Delta_pkg" ]; then
            echo "❌ No diff found, exiting."
            exit 1
          fi

      - name: Authenticate Org
        run: |
          echo "Authenticating DEV Org"
          sfdx force:auth:jwt:grant \
            --clientid $DEV_ORG_CLIENTID \
            --jwtkeyfile ./server.key \
            --username $DEV_ORG_USERNAME \
            --instanceurl $DEV_ORG_URL 

      - name: Run tests & check coverage
        run: |
          echo "🔍 Collecting changed Apex classes and triggers..."
          CHANGED_CLASSES=$(find Delta_pkg/main/default/classes -name "*.cls" -exec basename {} .cls \; 2>/dev/null)
          CHANGED_TRIGGERS=$(find Delta_pkg/main/default/triggers -name "*.trigger" -exec basename {} .trigger \; 2>/dev/null)

          if [[ -z "$CHANGED_CLASSES" && -z "$CHANGED_TRIGGERS" ]]; then
            echo "ℹ️ No Apex classes or triggers changed in this PR, skipping coverage check."
            exit 0
          fi

          echo "🔍 Changed Apex Classes: $CHANGED_CLASSES"
          echo "🔍 Changed Apex Triggers: $CHANGED_TRIGGERS"

          CHANGED_TEST_CLASSES=$(echo "$CHANGED_CLASSES" | sed 's/$/Test/' | tr '\n' ',' | sed 's/,$//')

          if [[ -z "$CHANGED_TEST_CLASSES" ]]; then
            echo "❌ No matching test classes found for changed Apex classes."
            exit 1
          fi

          echo "▶ Running tests: $CHANGED_TEST_CLASSES"
          sfdx force:apex:test:run \
            --tests "$CHANGED_TEST_CLASSES" \
            --codecoverage \
            --resultformat json \
            --outputdir test-results \
            --targetusername $DEV_ORG_USERNAME \
            --wait 30

          echo "🔍 Validating coverage..."
          for CLASS in $CHANGED_CLASSES $CHANGED_TRIGGERS; do
            COVERAGE=$(jq ".coverage.coverageByClass[] | select(.name==\"$CLASS\") | .percent" test-results/test-result.json)
            if [[ -z "$COVERAGE" ]]; then
              echo "❌ No coverage data found for $CLASS"
              exit 1
            fi
            if (( $(echo "$COVERAGE < 75" | bc -l) )); then
              echo "❌ $CLASS has coverage $COVERAGE%, below 75%"
              exit 1
            else
              echo "✅ $CLASS has coverage $COVERAGE%"
            fi
          done

      - name: Deploy to Org
        run: |
          TEST_LEVEL="${{ github.event.inputs.test_level }}"
          TEST_CLASSES="${{ github.event.inputs.test_classes }}"
          VALIDATION_ONLY="${{ github.event.inputs.validation_only }}"

          if [[ "$TEST_LEVEL" == "RunSpecifiedTests" ]]; then
            TEST_CLASSES=$(echo "$TEST_CLASSES" | tr '\n' ',' | tr -d ' ' | tr -s ',' | sed 's/^,//;s/,$//')
            if [[ -z "$TEST_CLASSES" ]]; then
              echo "❌ Please specify Test Class names for RunSpecifiedTests."
              exit 1
            fi
            echo "▶ Deploying with specified tests: $TEST_CLASSES"
            sfdx force:source:deploy \
              -p force-app/main/default \
              -u "$DEV_ORG_USERNAME" \
              -l RunSpecifiedTests \
              -r "$TEST_CLASSES" \
              ${VALIDATION_ONLY:+-c}
          elif [[ "$TEST_LEVEL" == "RunLocalTests" ]]; then
            echo "▶ Deploying with RunLocalTests"
            sfdx force:source:deploy \
              -p force-app/main/default \
              -u "$DEV_ORG_USERNAME" \
              -l RunLocalTests \
              ${VALIDATION_ONLY:+-c}
          elif [[ "$TEST_LEVEL" == "RunAllTestsInOrg" ]]; then
            echo "▶ Deploying with RunAllTestsInOrg"
            sfdx force:source:deploy \
              -p force-app/main/default \
              -u "$DEV_ORG_USERNAME" \
              -l RunAllTestsInOrg \
              ${VALIDATION_ONLY:+-c}
          elif [[ "$TEST_LEVEL" == "NoTestRun" ]]; then
            echo "▶ Deploying with NoTestRun"
            sfdx force:source:deploy \
              -p force-app/main/default \
              -u "$DEV_ORG_USERNAME" \
              -l NoTestRun \
              ${VALIDATION_ONLY:+-c}
          fi
