name: Deploy-To-QA

on:
  workflow_dispatch:
    inputs:
      manual_commit_id:
        description: 'Manual commit ID'
        required: false
        default: 'default'
      test_level:
        description: 'Enter type of test case to be checked'
        required: true
        type: choice
        options:
          - NoTestRun
          - RunSpecifiedTests
          - RunLocalTests
          - RunAllTestsInOrg
        default: RunSpecifiedTests
      test_classes:
        description: 'Test classes'
        required: false
        default: ''

env:
  QA_ORG_USER: ${{ vars.QA_USERNAME }}
  QA_ORG_PASSWORD: ${{ secrets.QA_PASSWORD }}
  QA_ORG_URL: ${{ vars.QA_URL }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: 'QAOrg'
          fetch-depth: 0

      - name: Debug repo structure
        run: |
          pwd
          ls -la
          find . -name "sfdx-project.json"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16.x'

      - name: Install SFDX CLI and plugins
        run: |
          npm install sfdx-cli --global
          sfdx --version
          echo 'y' | sfdx plugins:install sfpowerkit

      - name: Determine commit IDs and generate delta
        id: commit_delta
        run: |
          cd force-app

          LATEST_COMMIT_ID=$(git log -n 1 origin/QAOrg --pretty=format:'%H')
          MANUAL_COMMIT_ID="${{ github.event.inputs.manual_commit_id }}"

          if [[ "$MANUAL_COMMIT_ID" == 'default' ]]; then
            MANUAL_COMMIT_ID=$(git log --format="%P" -n 1)
            MANUAL_COMMIT_ID=$(echo $MANUAL_COMMIT_ID | cut -d ' ' -f1)
          fi

          echo "Latest COMMIT ID = $LATEST_COMMIT_ID"
          echo "Previous COMMIT ID = $MANUAL_COMMIT_ID"

          sfdx sfpowerkit:project:diff -r $MANUAL_COMMIT_ID -t $LATEST_COMMIT_ID -d Delta_pkg

          if [ ! -d "Delta_pkg" ]; then
            echo "❌ No diff found, exiting."
            exit 1
          fi

      - name: Authenticate QA Org
        run: |
          echo "Authenticating QA"
          sfdx sfpowerkit:auth:login -u $QA_ORG_USER -p $QA_ORG_PASSWORD -r $QA_ORG_URL

      - name: Check Code Coverage
        run: |
          echo "🔍 Running all tests with coverage..."
          sfdx force:apex:test:run -u $QA_ORG_USER --codecoverage --resultformat json --outputdir test-results --wait 30

          echo "🔍 Validating per-class coverage..."
          LOW_COVERAGE=$(jq '.coverage.coverageByClass[] | select(.percent < 75)' test-results/test-result.json)

          if [[ -n "$LOW_COVERAGE" ]]; then
            echo "❌ Some classes/triggers have <75% coverage:"
            echo "$LOW_COVERAGE"
            exit 1
          else
            echo "✅ All classes/triggers have >=75% coverage."
          fi

      - name: Deploy to QA Org
        run: |
          TEST_LEVEL="${{ github.event.inputs.test_level }}"
          TEST_CLASSES="${{ github.event.inputs.test_classes }}"

          if [[ "$TEST_LEVEL" == 'RunSpecifiedTests' ]]; then
            TEST_CLASSES=$(echo $TEST_CLASSES | tr -d ' ')
            if [[ -z "$TEST_CLASSES" ]]; then
              echo "❌ Please specify the Test Classes Names to run."
              exit 1
            else
              sfdx force:source:deploy -c -p Delta_pkg/force-app -u $QA_ORG_USER -l RunSpecifiedTests -r $TEST_CLASSES
            fi
          else
            sfdx force:source:deploy -c -p Delta_pkg/force-app -u $QA_ORG_USER -l $TEST_LEVEL
          fi

          echo "🎉 Validation completed successfully"
